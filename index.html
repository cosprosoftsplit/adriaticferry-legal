<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdriaticFerry - Adriatic Ferry Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F0F6FA;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 680px;
            width: 100%;
            padding: 60px 24px;
            text-align: center;
        }
        .app-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #1B2838, #0097A7);
            border-radius: 22px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        h1 {
            color: #1B2838;
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #0097A7;
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 48px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .links a {
            display: block;
            width: 280px;
            padding: 16px 24px;
            background: linear-gradient(135deg, #1B2838, #0097A7);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .links a:hover {
            opacity: 0.9;
        }
        footer {
            margin-top: 60px;
            color: #9CA3AF;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">&#x26F4;</div>
        <h1>AdriaticFerry</h1>
        <p class="subtitle">Adriatic Ferry Tracker</p>
        <div class="links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Service</a>
            <a href="support.html">Support</a>
        </div>
        <footer>&copy; 2026 SoftSplit d.o.o., Split, Croatia</footer>
    </div>
</body>
</html>
